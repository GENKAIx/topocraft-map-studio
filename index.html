<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TopoCraft — Редактор карт | GENKAI</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0b0b0f;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* Основной редактор на весь экран */
    .frame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      display: block;
    }

    /* Указание автора (Telegram) */
    .creator {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 9999;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 999px;
      padding: 10px 12px;
      text-decoration: none;
      color: #111827;
      font-weight: 600;
      font-size: 13px;
      line-height: 1;
      backdrop-filter: blur(6px);
    }

    .creator:hover {
      background: rgba(255, 255, 255, 1);
    }

  </style>
</head>
<body>
  <iframe class="frame" src="topocraft.html" title="TopoCraft editor" allowfullscreen></iframe>

  <a class="creator" href="https://t.me/genkai_ai" target="_blank" rel="noopener">
    Creator: @genkai_ai
  </a>
</body>
</html>
